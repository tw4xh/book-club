name: CI

# Runs on every PR and on pushes to main, so broken code can't be merged or
# deployed. This checks the code compiles, is formatted, and builds — it does
# not touch any database (SKIP_DB_INIT=1 keeps the build offline).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Format check
        run: npx prettier --check .

      - name: Build
        run: npm run build
        env:
          SKIP_DB_INIT: "1"
          # Dummy values so the build never reaches a real database or secret.
          DATABASE_URL: postgres://user:pass@localhost:5432/db
          SESSION_SECRET: ci-build-placeholder-secret-not-used-at-runtime
